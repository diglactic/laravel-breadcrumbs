name: tests

on:
  # Run action on every push and PR
  push:
  pull_request:

  # Run action at midnight to test against any updated dependencies
  schedule:
    - cron: '0 0 * * *'

jobs:
  phpunit:
    strategy:
      matrix:
        php: [ 8.5, 8.4, 8.3 ]
        laravel: [ 13.*, 12.*, 11.* ]
        os: [ ubuntu-latest, windows-latest ]

      # Continue running through matrix even if one combination fails
      fail-fast: false

    runs-on: ${{ matrix.os }}

    name: P${{ matrix.php }} - L${{ matrix.laravel }} - ${{ matrix.os }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: xdebug
          extensions: fileinfo

      - name: Install dependencies
        run: |
          # Install Laravel version per matrix
          composer require "laravel/framework:${{ matrix.laravel }}" --no-interaction

          composer install --no-interaction

      - name: Execute PHPUnit tests
        run: vendor/bin/phpunit --coverage-clover build/logs/clover.xml

      - name: Report coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: build/logs/clover.xml
